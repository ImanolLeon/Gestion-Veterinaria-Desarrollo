spring.application.name=GestionVeterinaria

# ==========================================
# CONFIGURACIÓN PARA TU XAMPP (MYSQL)
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/vetcaredb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# Dialecto correcto para que Hibernate hable en idioma MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Esto obliga a Spring a crear las tablas si no existen
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# ==========================================

# JWT
jwt.secret=VetCareSecretKeyForJWTAuthenticationSystem2026SecureKey!!!
jwt.expiration=86400000
jwt.refreshExpiration=604800000

logging.level.org.springframework.security=WARN
logging.level.com.proyecto.GestionVeterinaria.security=DEBUG

# Usuarios iniciales (seed)
app.seed.admin.username=admin
app.seed.admin.email=admin@vetcare.com
app.seed.admin.password=admin123

app.seed.veterinario.username=veterinario
app.seed.veterinario.email=veterinario@vetcare.com
app.seed.veterinario.password=vet123
app.seed.veterinario.nombres=Veterinariojava -jar GestionVeterinaria-0.0.1-SNAPSHOT.jar
app.seed.veterinario.apellidos=Demo
app.seed.veterinario.especialidad=General
app.seed.veterinario.colegiatura=CMV-0001